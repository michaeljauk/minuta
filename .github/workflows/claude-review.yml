name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Dismiss stale Claude reviews
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Dismiss previous REQUEST_CHANGES reviews from the bot (required before new review)
          gh api repos/$REPO/pulls/$PR_NUMBER/reviews --paginate \
            --jq '.[] | select(.user.type == "Bot" and .state == "CHANGES_REQUESTED") | .id' \
          | while read -r review_id; do
            gh api repos/$REPO/pulls/$PR_NUMBER/reviews/$review_id/dismissals \
              -X PUT -f message="Superseded by new review after push" || true
          done

          # Delete previous issue comments that carry the claude-review marker
          gh api repos/$REPO/issues/$PR_NUMBER/comments --paginate \
            --jq '.[] | select(.user.type == "Bot" and (.body | contains("<!-- claude-review -->"))) | .id' \
          | while read -r comment_id; do
            gh api repos/$REPO/issues/comments/$comment_id -X DELETE || true
          done

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are a code reviewer. Your output MUST be a proper GitHub Pull Request Review
            submitted via the API — not a plain comment. Follow these steps exactly.

            ## 1. Gather PR context

            ```bash
            PR_NUMBER=$(gh pr view --json number -q .number)
            REPO=$(gh repo view --json nameWithOwner -q .nameWithOwner)

            # Get changed files with patch data
            gh api repos/$REPO/pulls/$PR_NUMBER/files > /tmp/pr_files.json

            # Get PR metadata
            gh pr view $PR_NUMBER --json title,body,baseRefName,headRefName > /tmp/pr_meta.json
            ```

            Read /tmp/pr_files.json — each entry has:
            - `filename`: path relative to repo root
            - `patch`: unified diff for that file (may be absent for binary files)
            - `status`: added | modified | removed | renamed

            ## 2. Analyze the diff

            For each changed file, read the `patch` field. The patch uses standard unified diff
            format: lines starting with `+` are additions, `-` are deletions, ` ` are context.

            To place an inline comment you need:
            - `path`: the `filename` value from the file entry
            - `line`: the **right-side (new file) line number** of the line you want to comment on
              — this MUST be a line that appears in the patch (either a `+` addition line or a
              context line that is present in the hunk). You cannot comment on removed lines.
            - `side`: always `"RIGHT"`

            Parse line numbers carefully from the `@@ -old_start,old_count +new_start,new_count @@`
            hunk headers to track the current new-file line number as you walk the patch.

            ## 3. Project context

            Tauri v2 desktop app (Rust + React) — local-first AI meeting note taker.
            Turborepo monorepo (pnpm workspaces):
            - `apps/desktop` — React + Vite frontend for Tauri
            - `packages/core` — shared TypeScript types
            - `packages/ui` — shared UI components (shadcn/ui + Tailwind)
            - `src-tauri/` — Rust backend (audio capture, whisper transcription, Ollama summarization)

            Tech stack:
            - **Frontend:** React 19, shadcn/ui, Tailwind CSS, react-i18next (de/en)
            - **Backend:** Rust, Tauri v2, cpal (audio), whisper-rs (transcription), hound (WAV)
            - **Package manager:** pnpm (never npm or yarn)
            - **Linter:** Biome

            ## 4. Review checklist

            - **Rust safety** — unsafe blocks justified, no panics in production paths, proper error handling with `Result`/`AppError`
            - **Audio threading** — lock-free ring buffers used correctly, no deadlocks, stop flags checked
            - **TypeScript** — missing types, `any`, unsafe casts, proper Tauri `invoke` typing
            - **i18n** — user-facing strings must use react-i18next `t()`, not hardcoded text
            - **Tauri IPC** — command signatures match between Rust `#[tauri::command]` and TS `invoke()` calls
            - **Settings migration** — backward compatibility when adding new fields (use `#[serde(default)]`)
            - **Security** — XSS, path traversal in vault/storage paths, exposed API keys
            - **Dependencies** — use `pnpm`, never `npm` or `yarn`
            - **Platform compat** — `#[cfg(target_os)]` guards for platform-specific code

            ## 5. Build and submit the review

            Create /tmp/review.json with this structure:

            ```json
            {
              "body": "<!-- claude-review -->\n<2–3 sentence PR summary>\n\n<overall findings if any>",
              "event": "COMMENT",
              "comments": [
                {
                  "path": "src-tauri/src/example.rs",
                  "line": 42,
                  "side": "RIGHT",
                  "body": "[CRITICAL] Explain the issue and what to do instead."
                }
              ]
            }
            ```

            Severity prefixes:
            - `[CRITICAL]` — bug, security issue, data loss risk
            - `[WARNING]` — likely problem, bad pattern
            - `[SUGGESTION]` — optional improvement

            Rules:
            - The `body` field in the top-level review MUST start with `<!-- claude-review -->` on its own line.
            - Only include `comments` entries for lines that are actually in the diff patch. If you
              cannot identify a valid line number, omit the inline comment and mention it in the review body instead.
            - Skip praise. Be concise and actionable.
            - If there are no issues to flag, set `"event": "APPROVE"` and write a brief summary.

            Then submit:

            ```bash
            gh api repos/$REPO/pulls/$PR_NUMBER/reviews -X POST --input /tmp/review.json
            ```
