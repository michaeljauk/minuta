pre-commit:
  jobs:
    - name: sync-docs
      glob: "src-tauri/src/settings.rs\nsrc-tauri/src/*.rs"
      run: bash scripts/sync-docs.sh && git add AGENT.md
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files} && git add {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
